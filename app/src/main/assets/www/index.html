<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#2f69e8">
<meta name="description" content="히라가나, 가타카나, 기초단어, 플래시카드, 퀴즈, 오답노트를 제공하는 일본어 학습 앱">
<meta name="application-name" content="하루니혼 Lite">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="하루니혼 Lite">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">
<title>하루니혼 Lite</title>
<style>
:root{
  --bg:#f4f6fb;--card:#fff;--ink:#111827;--muted:#747b89;--line:#e4e7ef;
  --blue:#2f69e8;--blue2:#eaf1ff;--green:#25a66f;--red:#c43d3d;--yellow:#ffd43b;
  --shadow:0 10px 28px rgba(20,32,68,.08);--r:22px
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Noto Sans KR","Noto Sans JP",sans-serif}
button,input,select{font:inherit}
.app{max-width:680px;margin:auto;min-height:100vh;padding-bottom:94px}
header{padding:30px 24px 18px;position:sticky;top:0;z-index:10;background:linear-gradient(var(--bg) 82%,transparent)}
.brand{display:flex;justify-content:space-between;align-items:flex-start}
.brand h1{font-size:34px;margin:0 0 8px;letter-spacing:-1.4px}
.brand p{margin:0;color:var(--muted);font-size:16px}
.theme{width:70px;height:70px;border:1px solid var(--line);background:white;border-radius:20px;font-size:30px;box-shadow:var(--shadow)}
main{padding:0 24px 24px}
.view{display:none}.view.active{display:block}
.section-title{font-size:25px;margin:30px 6px 18px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.stat{background:white;border:1px solid var(--line);border-radius:26px;padding:28px 24px;min-height:150px;box-shadow:var(--shadow)}
.stat .label{color:var(--muted);font-size:17px}.stat b{display:block;font-size:46px;margin-top:15px}
.progress-card{margin-top:14px;background:white;border:1px solid var(--line);border-radius:26px;padding:22px 24px;box-shadow:var(--shadow)}
.progress-row{display:flex;justify-content:space-between;align-items:center}
.bar{height:12px;border-radius:999px;background:#e9edf6;overflow:hidden;margin-top:14px}
.bar span{display:block;height:100%;background:var(--blue);width:0}
.quick{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.quick button{min-height:130px;text-align:left;border:1px solid var(--line);background:white;border-radius:24px;padding:24px;box-shadow:var(--shadow)}
.quick button.primary{background:var(--blue);color:white;border-color:var(--blue)}
.quick .icon{font-size:30px}.quick h3{margin:12px 0 5px;font-size:21px}.quick p{margin:0;color:var(--muted)}
.quick .primary p{color:#dbe7ff}
.card{background:white;border:1px solid var(--line);border-radius:24px;padding:24px;box-shadow:var(--shadow)}
.word-card{margin-bottom:14px;display:grid;grid-template-columns:1fr auto;gap:14px}
.word-jp{font-size:35px;font-weight:800;line-height:1.1}.reading{color:#2869c8;font-size:18px;margin-top:4px}
.meaning{font-size:22px;margin:13px 0}.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{background:#f4f6fa;color:#697183;padding:7px 12px;border-radius:999px;font-size:13px}
.example{color:#727987;line-height:1.55;margin-top:16px}
.actions{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;justify-content:flex-end}
.iconbtn{min-width:58px;height:58px;border:1px solid var(--line);background:white;border-radius:16px;font-size:22px}
.textbtn{height:58px;border:1px solid var(--line);background:white;border-radius:16px;padding:0 18px;font-size:17px}
.textbtn.danger{color:var(--red)}
.search{width:100%;padding:18px 20px;border:1px solid var(--line);border-radius:18px;background:white;font-size:18px;margin-bottom:14px}
.filters{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.filters select{padding:17px;border:1px solid var(--line);border-radius:18px;background:white}
.fab{position:fixed;right:max(24px,calc((100vw - 680px)/2 + 24px));bottom:112px;width:72px;height:72px;border-radius:50%;border:0;background:var(--blue);color:white;font-size:42px;box-shadow:0 12px 28px rgba(47,105,232,.35)}
.kana-tabs{display:flex;gap:10px;margin-bottom:15px;overflow:auto}
.pill{border:1px solid var(--line);background:white;border-radius:999px;padding:11px 16px;white-space:nowrap}
.pill.active{background:var(--blue);color:white;border-color:var(--blue)}
.kana-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.kana{border:1px solid var(--line);background:white;border-radius:17px;padding:16px 4px;box-shadow:0 4px 14px rgba(20,32,68,.05)}
.kana b{display:block;font-size:27px}.kana small{color:var(--muted)}
.study-wrap{text-align:center}
.flash{min-height:430px;display:flex;flex-direction:column;justify-content:center;align-items:center}
.flash small{color:var(--muted);font-size:16px}.flash .big{font-size:58px;font-weight:800;margin:20px 0}
.flash .answer{display:none}.flash.show .answer{display:block}.flash .answer .ko{font-size:28px}
.study-buttons{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}
.study-buttons button{padding:20px;border-radius:18px;border:1px solid var(--line);background:transparent;font-size:18px}
.study-buttons .done{background:var(--blue);color:white;border-color:var(--blue)}
.quiz-card .lead{color:var(--muted);margin-bottom:25px}.quiz-q{font-size:31px;font-weight:800;margin:10px 0 28px}
.option{display:block;width:100%;text-align:left;padding:20px;border:1px solid var(--line);border-radius:18px;background:white;margin:11px 0;font-size:18px}
.option.correct{background:#e9f8f1;border-color:#27aa72}.option.wrong{background:#fdecec;border-color:#d85252}
.next{width:100%;padding:20px;border-radius:18px;border:1px solid var(--line);background:white;font-size:20px;margin-top:18px}
.empty{text-align:center;color:var(--muted);padding:50px 20px}
nav{position:fixed;bottom:0;left:0;right:0;max-width:680px;margin:auto;background:#fffd;border-top:1px solid var(--line);backdrop-filter:blur(15px);display:grid;grid-template-columns:repeat(6,1fr);padding:8px 4px calc(8px + env(safe-area-inset-bottom));z-index:20}
nav button{border:0;background:none;color:#687080;font-size:11px;padding:5px 0}nav button span{display:block;font-size:23px;margin-bottom:3px}nav button.active{color:var(--blue);font-weight:700}
@media(max-width:430px){
  header{padding:24px 18px 14px}main{padding:0 18px 20px}.brand h1{font-size:31px}
  .theme{width:62px;height:62px}.stat{min-height:130px;padding:23px 20px}.stat b{font-size:40px}
  .quick button{min-height:116px;padding:20px}.word-card{grid-template-columns:1fr}.actions{justify-content:flex-start}
  .word-jp{font-size:31px}.kana-grid{gap:8px}.kana{padding:14px 2px}
}

.install-banner{display:none;margin:0 24px 18px;padding:16px 18px;background:#eaf1ff;border:1px solid #cddcff;border-radius:18px;align-items:center;gap:12px}
.install-banner.show{display:flex}.install-banner .grow{flex:1}.install-banner b{display:block;margin-bottom:3px}.install-banner small{color:#5d6b83}
.install-banner button{border:0;background:var(--blue);color:white;border-radius:13px;padding:11px 15px}
.release-badge{display:inline-block;margin-top:10px;background:#eaf1ff;color:#2f69e8;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700}
body.dark{--bg:#11151d;--card:#1a202b;--ink:#f1f5f9;--muted:#9aa6b7;--line:#30394a;--blue2:#1f3158}
body.dark header{background:linear-gradient(var(--bg) 82%,transparent)}
body.dark .theme,body.dark .stat,body.dark .progress-card,body.dark .quick button,body.dark .card,body.dark .search,
body.dark .filters select,body.dark .kana,body.dark .option,body.dark .next,body.dark .iconbtn,body.dark .textbtn{background:var(--card);color:var(--ink)}
body.dark nav{background:#171c25f2}body.dark .chip{background:#293140;color:#c3ccda}
body.dark .install-banner{background:#18294d;border-color:#29447a}

</style>
</head>
<body>
<div class="app">
<header>
  <div class="brand">
    <div><h1>하루니혼 Lite</h1><p>매일 조금씩, 일본어가 익숙해지는 앱 · v1.0.1</p><span class="release-badge">1일 프로젝트 첫 출시작</span></div>
    <button class="theme" onclick="toggleTheme()">🌙</button>
  </div>
</header>
<div id="installBanner" class="install-banner">
<div class="grow"><b>앱으로 설치하기</b><small>홈 화면에서 전체화면·오프라인으로 사용할 수 있어요.</small></div>
<button id="installBtn">설치</button></div>
<main>
<section id="home" class="view active">
  <div class="stats">
    <div class="stat"><span class="label">전체 단어</span><b id="totalWords">1000</b></div>
    <div class="stat"><span class="label">암기 완료</span><b id="memorizedCount">0</b></div>
    <div class="stat"><span class="label">오답 단어</span><b id="wrongCount">0</b></div>
    <div class="stat"><span class="label">오늘 학습</span><b id="todayCount">0</b></div>
  </div>
  <div class="progress-card">
    <div class="progress-row"><b>오늘의 학습률</b><span id="progressText">0%</span></div>
    <div class="bar"><span id="progressBar"></span></div>
  </div>

  <h2 class="section-title">빠른 학습</h2>
  <div class="quick">
    <button class="primary" onclick="go('card')"><div class="icon">🃏</div><h3>플래시카드</h3><p>단어를 넘기며 암기</p></button>
    <button onclick="go('quiz')"><div class="icon">🧩</div><h3>퀴즈</h3><p>4지선다로 복습</p></button>
    <button onclick="go('kana')"><div class="icon">あ</div><h3>문자표</h3><p>히라가나·가타카나</p></button>
    <button onclick="go('talk')"><div class="icon">💬</div><h3>생활회화</h3><p>필수 문장 100개</p></button>
    <button onclick="go('wrong')"><div class="icon">📝</div><h3>오답노트</h3><p>틀린 단어 집중 학습</p></button>
  </div>

  <h2 class="section-title">이어서 공부하기</h2>
  <div id="continueCard" class="card"></div>
</section>

<section id="kana" class="view">
  <h2 class="section-title" style="margin-top:4px">문자 학습</h2>
  <div class="kana-tabs">
    <button class="pill active" onclick="setKana('hiragana',this)">히라가나</button>
    <button class="pill" onclick="setKana('katakana',this)">가타카나</button>
  </div>
  <div id="kanaGrid" class="kana-grid"></div>
</section>

<section id="words" class="view">
  <input class="search" id="search" placeholder="일본어, 읽기, 뜻 검색" oninput="renderWords()">
  <div class="filters">
    <select id="levelFilter" onchange="renderWords()"><option>전체 난이도</option><option>N5</option></select>
    <select id="statusFilter" onchange="renderWords()"><option>전체 상태</option><option>암기완료</option><option>즐겨찾기</option><option>미암기</option></select>
  </div>
  <div id="wordList"></div>
  <button class="fab" onclick="alert('사용자 단어 추가 기능은 다음 버전에서 연결합니다.')">＋</button>
</section>

<section id="talk" class="view">
  <h2 class="section-title" style="margin-top:4px">생활회화 100문장</h2>
  <input class="search" id="talkSearch" placeholder="일본어, 읽기, 한국어 뜻 검색" oninput="renderTalk()">
  <div id="talkCount" class="lead" style="margin:14px 4px"></div>
  <div id="talkList"></div>
</section>

<section id="card" class="view">
  <div class="card study-wrap">
    <div id="flash" class="flash" onclick="revealCard()">
      <small id="cardIndex">1 / 1000</small>
      <div class="big" id="cardJP"></div>
      <div class="answer"><div class="reading" id="cardReading"></div><div class="ko" id="cardKO"></div></div>
    </div>
  </div>
  <div class="study-buttons">
    <button onclick="speakCurrentCard()">🔊 발음 듣기</button>
    <button id="autoSpeakBtn" onclick="toggleAutoSpeak()">자동재생 꺼짐</button>
    <button onclick="revealCard()">뜻 보기</button>
    <button onclick="nextCard()">다음</button>
    <button onclick="repeatCard()">다시 보기</button>
    <button class="done" onclick="memorizeCurrent()">암기 완료</button>
  </div>
</section>

<section id="quiz" class="view">
  <div class="card quiz-card">
    <div class="lead" id="quizLead">정답을 골라보세요</div>
    <div class="quiz-q" id="quizQ"></div>
    <div id="quizOptions"></div>
  </div>
  <button class="next" onclick="nextQuiz()">다음 문제</button>
</section>

<section id="wrong" class="view">
  <h2 class="section-title" style="margin-top:4px">오답노트</h2>
  <div id="wrongList"></div>
</section>
</main>

<nav>
  <button class="active" data-v="home" onclick="go('home',this)"><span>🏠</span>홈</button>
  <button data-v="words" onclick="go('words',this)"><span>📚</span>단어장</button>
  <button data-v="kana" onclick="go('kana',this)"><span>あ</span>문자</button>
  <button data-v="talk" onclick="go('talk',this)"><span>💬</span>회화</button>
  <button data-v="card" onclick="go('card',this)"><span>🃏</span>카드</button>
  <button data-v="quiz" onclick="go('quiz',this)"><span>🧩</span>퀴즈</button>
  <button data-v="wrong" onclick="go('wrong',this)"><span>📝</span>오답</button>
</nav>
</div>

const LS={
  mem:new Set(JSON.parse(localStorage.getItem('hn_mem')||'[]')),
  fav:new Set(JSON.parse(localStorage.getItem('hn_fav')||'[]')),
  wrong:JSON.parse(localStorage.getItem('hn_wrong')||'{}'),
  today:Number(localStorage.getItem('hn_today')||0)
};
let kanaType='hiragana', cardIndex=0, qIndex=0, currentQ=null, qLocked=false, autoSpeak=false;

function persist(){
  localStorage.setItem('hn_mem',JSON.stringify([...LS.mem]));
  localStorage.setItem('hn_fav',JSON.stringify([...LS.fav]));
  localStorage.setItem('hn_wrong',JSON.stringify(LS.wrong));
  localStorage.setItem('hn_today',String(LS.today));
  updateStats();
}

function go(id,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.v===id));
  if(btn) btn.classList.add('active');
  if(id==='words')renderWords();
  if(id==='wrong')renderWrong();
  if(id==='quiz')newQuiz();
  if(id==='card')showCard();
  window.scrollTo(0,0);
}

function updateStats(){
  memorizedCount.textContent=LS.mem.size;
  wrongCount.textContent=Object.keys(LS.wrong).length;
  todayCount.textContent=LS.today;
  const pct=Math.min(100,Math.round(LS.today/20*100));
  progressText.textContent=pct+'%';progressBar.style.width=pct+'%';
  const idx=[...Array(DATA.vocab.length).keys()].find(i=>!LS.mem.has(i)) ?? 0;
  const w=DATA.vocab[idx];
  continueCard.innerHTML=`<div class="word-jp">${w.jp}</div><div class="reading">${w.reading}</div><div class="meaning">${w.ko}</div><div class="chips"><span class="chip">${w.level}</span><span class="chip">${w.pos}</span></div><button class="next" style="margin-top:18px" onclick="cardIndex=${idx};go('card')">이어서 학습</button>`;
}

function speak(t){
  if(!('speechSynthesis' in window))return;
  speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='ja-JP';u.rate=.82;speechSynthesis.speak(u);
}

function toggleTheme(){
  document.body.classList.toggle('dark');
  const dark=document.body.classList.contains('dark');
  localStorage.setItem('hn_dark',dark?'1':'0');
  document.querySelector('.theme').textContent=dark?'☀️':'🌙';
}

function setKana(type,el){
  kanaType=type;document.querySelectorAll('.kana-tabs .pill').forEach(x=>x.classList.remove('active'));el.classList.add('active');renderKana();
}
function renderKana(){
  kanaGrid.innerHTML=DATA[kanaType].map(k=>`<button class="kana" onclick="speak('${k[0]}')"><b>${k[0]}</b><small>${k[1]}</small></button>`).join('');
}

function wordCard(w,i,showDelete=false){
  const fav=LS.fav.has(i), mem=LS.mem.has(i);
  return `<div class="card word-card">
    <div>
      <div class="word-jp">${w.jp} ${fav?'⭐':''}</div>
      <div class="reading">${w.reading}</div>
      <div class="meaning">${w.ko}</div>
      <div class="chips"><span class="chip">${w.level}</span><span class="chip">${w.pos}</span>${mem?'<span class="chip">암기완료</span>':''}</div>
      <div class="example">${w.example}<br>${w.exampleKo}</div>
    </div>
    <div class="actions">
      <button class="iconbtn" onclick="toggleFav(${i})">⭐</button>
      <button class="iconbtn" onclick="speak('${w.jp.replaceAll("'","")}')">🔊</button>
      <button class="iconbtn" onclick="toggleMem(${i})">✓</button>
      ${showDelete?'<button class="textbtn danger" onclick="removeWrong('+i+')">삭제</button>':''}
    </div>
  </div>`;
}

function renderWords(){
  const q=search.value.trim().toLowerCase(), status=statusFilter.value;
  let arr=DATA.vocab.map((w,i)=>({w,i})).filter(o=>!q||o.w.jp.includes(q)||o.w.reading.includes(q)||o.w.ko.toLowerCase().includes(q));
  if(status==='암기완료')arr=arr.filter(o=>LS.mem.has(o.i));
  if(status==='즐겨찾기')arr=arr.filter(o=>LS.fav.has(o.i));
  if(status==='미암기')arr=arr.filter(o=>!LS.mem.has(o.i));
  wordList.innerHTML=arr.slice(0,150).map(o=>wordCard(o.w,o.i)).join('')+(arr.length>150?'<div class="empty">검색 속도를 위해 처음 150개만 표시합니다.</div>':'');
}

function toggleFav(i){LS.fav.has(i)?LS.fav.delete(i):LS.fav.add(i);persist();renderWords();}
function toggleMem(i){LS.mem.has(i)?LS.mem.delete(i):LS.mem.add(i);persist();renderWords();}

function renderTalk(){
  const input=document.getElementById('talkSearch');
  const list=document.getElementById('talkList');
  const count=document.getElementById('talkCount');
  if(!input||!list||!DATA.conv)return;
  const q=input.value.trim().toLowerCase();
  const arr=DATA.conv.filter(x=>!q||x.jp.toLowerCase().includes(q)||x.reading.toLowerCase().includes(q)||x.ko.toLowerCase().includes(q));
  if(count) count.textContent=`총 ${arr.length}문장`;
  list.innerHTML=arr.map((x,i)=>`<div class="word-card">
    <div><div class="chip">${i+1}</div><div class="word-jp">${x.jp}</div><div class="reading">${x.reading}</div><div class="ko">${x.ko}</div></div>
    <div class="actions"><button class="iconbtn" onclick='speak(${JSON.stringify(x.jp)})'>🔊 발음</button></div>
  </div>`).join('')||'<div class="empty">검색 결과가 없습니다.</div>';
}

function showCard(){
  const w=DATA.vocab[cardIndex%DATA.vocab.length];
  flash.classList.remove('show');const cardIndexEl=cardIndex%DATA.vocab.length;
  document.getElementById('cardIndex').textContent=`${cardIndexEl+1} / ${DATA.vocab.length}`;
  cardJP.textContent=w.jp;cardReading.textContent=w.reading;cardKO.textContent=w.ko;
  if(autoSpeak) setTimeout(()=>speak(w.jp),120);
}
function speakCurrentCard(){
  const w=DATA.vocab[cardIndex%DATA.vocab.length];
  speak(w.jp);
}
function toggleAutoSpeak(){
  autoSpeak=!autoSpeak;
  const btn=document.getElementById('autoSpeakBtn');
  btn.textContent=autoSpeak?'자동재생 켜짐':'자동재생 꺼짐';
  btn.classList.toggle('done',autoSpeak);
  if(autoSpeak) speakCurrentCard();
}
function revealCard(){flash.classList.add('show')}
function nextCard(){cardIndex=(cardIndex+1)%DATA.vocab.length;showCard()}
function repeatCard(){showCard()}
function memorizeCurrent(){LS.mem.add(cardIndex%DATA.vocab.length);LS.today++;persist();nextCard()}

function newQuiz(){
  const correctIndex=Math.floor(Math.random()*DATA.vocab.length), w=DATA.vocab[correctIndex];
  const wrongs=[];
  while(wrongs.length<3){const i=Math.floor(Math.random()*DATA.vocab.length);if(i!==correctIndex&&!wrongs.includes(i)&&DATA.vocab[i].ko!==w.ko)wrongs.push(i)}
  currentQ={correctIndex,w,opts:[correctIndex,...wrongs].sort(()=>Math.random()-.5)};
  qLocked=false;quizLead.textContent='정답을 골라보세요';quizQ.textContent=`“${w.jp}”의 뜻은?`;
  quizOptions.innerHTML=currentQ.opts.map(i=>`<button class="option" onclick="answerQuiz(this,${i})">${DATA.vocab[i].ko}</button>`).join('');
}
function answerQuiz(el,i){
  if(qLocked)return;qLocked=true;
  document.querySelectorAll('.option').forEach((b,k)=>{const oi=currentQ.opts[k];if(oi===currentQ.correctIndex)b.classList.add('correct')});
  if(i===currentQ.correctIndex){quizLead.textContent='정답입니다!';LS.today++;}
  else{el.classList.add('wrong');quizLead.textContent='오답입니다. 오답노트에 추가했어요.';const idx=currentQ.correctIndex;LS.wrong[idx]=(LS.wrong[idx]||0)+1;}
  persist();
}
function nextQuiz(){newQuiz()}

function renderWrong(){
  const entries=Object.entries(LS.wrong).sort((a,b)=>b[1]-a[1]);
  wrongList.innerHTML=entries.length?entries.map(([i,c])=>wordCard(DATA.vocab[i],Number(i),true).replace('</div>','<div class="example">틀린 횟수: '+c+'회 · 복습 필요</div></div>')).join(''):'<div class="empty">아직 오답이 없습니다.</div>';
}
function removeWrong(i){delete LS.wrong[i];persist();renderWrong()}

renderKana();renderTalk();updateStats();showCard();

let deferredInstallPrompt=null;
window.addEventListener('beforeinstallprompt',(e)=>{e.preventDefault();deferredInstallPrompt=e;document.getElementById('installBanner')?.classList.add('show');});
document.getElementById('installBtn')?.addEventListener('click',async()=>{if(!deferredInstallPrompt)return;deferredInstallPrompt.prompt();await deferredInstallPrompt.userChoice;deferredInstallPrompt=null;document.getElementById('installBanner')?.classList.remove('show');});
window.addEventListener('appinstalled',()=>document.getElementById('installBanner')?.classList.remove('show'));
if('serviceWorker' in navigator && location.protocol.startsWith('http')){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));}
if(localStorage.getItem('hn_dark')==='1'){document.body.classList.add('dark');const t=document.querySelector('.theme');if(t)t.textContent='☀️';}

</script>
</body></html><style>#installBanner{display:none!important}</style>
