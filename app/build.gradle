plugins { id 'com.android.application' }

android {
    namespace 'com.harunihon.lite'
    compileSdk 35

    defaultConfig {
        applicationId 'com.harunihon.lite'
        minSdk 24
        targetSdk 35
        versionCode 2
        versionName '1.0.1'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}
